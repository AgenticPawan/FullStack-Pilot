# pilot-drift.yml — Stack Drift Detection
#
# Emitted to PROJECT_ROOT/.github/workflows/pilot-drift.yml by /pilot-init.
# Compares current package versions and project structure against the saved
# .claude/pilot/stack-profile.json. Opens a GitHub Issue when drift is detected.
#
# Substitutions performed by pilot-scaffold when emitting this file:
#   {{DEFAULT_BRANCH}}  →  main or master (detected from git)

name: Pilot Drift Detection

on:
  schedule:
    - cron: '0 9 * * 1'   # Every Monday at 09:00 UTC
  workflow_dispatch:        # Manual trigger for on-demand checks

permissions:
  contents: read
  issues: write

jobs:
  detect-drift:
    name: Detect stack drift
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: {{DEFAULT_BRANCH}}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run drift detection
        id: drift
        run: node .github/scripts/pilot-drift-check.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Open or update drift issue
        if: steps.drift.outputs.drift_detected == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const title = '[pilot-drift] Stack drift detected — ' + new Date().toISOString().slice(0, 10);
            const body  = process.env.DRIFT_BODY;

            // Look for an existing open drift issue to update rather than open duplicates
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              state: 'open',
              labels: 'pilot-drift',
            });

            const existing = issues.find(i => i.title.startsWith('[pilot-drift]'));

            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: existing.number,
                title,
                body,
              });
              console.log('Updated existing drift issue #' + existing.number);
            } else {
              const { data: newIssue } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                title,
                body,
                labels: ['pilot-drift'],
              });
              console.log('Opened drift issue #' + newIssue.number);
            }
        env:
          DRIFT_BODY: ${{ steps.drift.outputs.drift_body }}

      - name: No drift
        if: steps.drift.outputs.drift_detected == 'false'
        run: echo "No drift detected — stack-profile.json matches current codebase."
