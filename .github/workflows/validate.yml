name: Validate

on:
  push:
  pull_request:

jobs:
  validate:
    name: Validate manifests and skills
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run validator
        run: node scripts/validate.mjs
        # Fails the build if (see scripts/validate.mjs for the authoritative list):
        #   - marketplace.json or any plugin.json is invalid JSON, missing a required field,
        #     or carries a description over its char budget (600 for plugin/catalog entries)
        #   - any SKILL.md is missing YAML frontmatter or a description, or the combined
        #     description + when_to_use exceeds 1024 chars
        #   - any agent violates the model matrix, read-only convention, or read-budget rule
        #   - any command file is not fsp-<verb>.md, lacks a description, or references a
        #     slash-command that does not exist (dangling-reference check)
        #   - any auto-loaded .mcp.json has an unpinned third-party npm/docker reference
        #   - any hooks.json uses a "*" matcher, or references a script that does not exist,
        #     is not executable, or recurses excluded directories
        #   - the hook unit-test suite (tests/hooks/run-tests.mjs) fails

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code
        # Required for `claude plugin validate --strict` below.
        # Pin this once a stable release tag is published; for now uses latest npm release.

      - name: Plugin validate (strict)
        run: |
          set -e
          for plugin in plugins/pilot-core plugins/pilot-angular plugins/pilot-dotnet plugins/pilot-sql plugins/pilot-azure plugins/pilot-rag; do
            echo "Validating $plugin ..."
            claude plugin validate "./$plugin" --strict
          done
        # Supplements validate.mjs with the Claude Code runtime's own YAML parser.
        # Catches issues our custom parser tolerates (e.g. unquoted colon-space in values)
        # that would silently drop all frontmatter fields at runtime. --strict treats
        # warnings (unrecognised fields, missing metadata) as errors.
