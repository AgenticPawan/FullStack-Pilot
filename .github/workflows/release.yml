name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  gate:
    name: Validate before allowing a release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run validator (includes hook tests)
        run: node scripts/validate.mjs
        # scripts/validate.mjs already runs tests/hooks/run-tests.mjs as its final
        # step, so a hook regression blocks the release the same as a manifest error.

  release:
    name: Create GitHub release
    needs: gate
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
